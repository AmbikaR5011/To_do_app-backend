services:
  - type: web
    name: to-do-app
    runtime: java
    buildCommand: ./mvnw clean package
    startCommand: java -jar target/to-do-app-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        value: jdbc:mysql://REPLACE_CLEVER_HOST:3306/REPLACE_DB_NAME?useSSL=true&requireSSL=true
      - key: DATABASE_USERNAME
        value: REPLACE_DB_USERNAME
      - key: DATABASE_PASSWORD

