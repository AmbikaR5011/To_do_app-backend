spring.application.name=to-do-app

# Use environment variables in dev so credentials are not stored in source
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/to_do_app}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=8080

